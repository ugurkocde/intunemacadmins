name: Content pipeline

on:
  # No cron schedule: this pipeline runs on a self-hosted runner on a personal
  # MacBook that is frequently powered off. A clock-based schedule is skipped
  # entirely when the Mac is off at that time (launchd does not replay a missed
  # calendar event after a power-off). Instead, a LaunchAgent on that Mac
  # (com.ugurkoc.content-pipeline-dispatch) dispatches this workflow on boot
  # whenever the current ISO week has no run yet -- so the weekly run starts as
  # soon as the Mac is online. Manual runs still work via the inputs below.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build everything but upload an artifact instead of opening a PR"
        type: boolean
        default: false
      source:
        description: "Limit to a single source"
        type: choice
        default: all
        options:
          - all
          - ms-whats-new
          - tech-community
          - community-blog
          - reddit
      runner:
        description: "Where to run (self-hosted = your residential IP; ubuntu-latest = GitHub cloud, Reddit/Rockenroll get IP-blocked)"
        type: choice
        default: self-hosted
        options:
          - self-hosted
          - ubuntu-latest

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: content-pipeline
  cancel-in-progress: false

jobs:
  update-content:
    # Scheduled runs use the self-hosted runner (residential IP, no source IP
    # blocks). A manual run can pick the cloud via the `runner` input.
    runs-on: ${{ github.event.inputs.runner || 'self-hosted' }}
    timeout-minutes: 30
    steps:
      # Self-hosted runners (esp. as a launchd/systemd service) often have a
      # stripped PATH that omits Homebrew, so gh/jq aren't found. Add the common
      # locations. No-op on GitHub's cloud runners (dirs absent or already set).
      - name: Ensure local tools on PATH
        run: |
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Pipeline self-test
        run: npm run pipeline:selftest

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          SOURCE: ${{ github.event.inputs.source || 'all' }}
          DRY_RUN: ${{ inputs.dry_run == true && 'true' || 'false' }}
        run: |
          args=(--source="$SOURCE")
          [ "$DRY_RUN" = "true" ] && args+=(--dry-run)
          npm run pipeline -- "${args[@]}"

      - name: Write run summary
        if: ${{ always() }}
        run: |
          if [ -f .cache/pr-body.md ]; then
            echo "## Content pipeline result" >> "$GITHUB_STEP_SUMMARY"
            cat .cache/pr-body.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload dry-run preview
        if: ${{ inputs.dry_run == true }}
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-preview
          path: |
            .cache/preview/
            .cache/run-report.json
            .cache/pr-body.md
          retention-days: 14

      - name: Open content PR
        if: ${{ inputs.dry_run != true }}
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            content/**
            data/pipeline-state.json
          branch: content-pipeline/weekly
          delete-branch: true
          commit-message: Weekly content update
          title: Weekly content update
          body-path: .cache/pr-body.md
          labels: automated-content

      - name: Report source failures as issues
        if: ${{ always() && !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [ -f .cache/run-report.json ] || exit 0
          gh label create content-pipeline --description "Automated content pipeline" --color D93F0B --force

          # One issue per failing source; comment if it already exists.
          jq -r '.sourceErrors[] | [.source, .error] | @tsv' .cache/run-report.json |
          while IFS=$'\t' read -r source error; do
            title="Content pipeline: ${source} is failing"
            search_query="in:title \"${source}\""
            existing=$(gh issue list --label content-pipeline --state open --search "$search_query" --json number --jq '.[0].number // empty')
            body="Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Error: \`${error}\`"
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --body "Still failing. $body"
            else
              gh issue create --title "$title" --label content-pipeline --body "$body"
            fi
          done

          # Close issues for sources that recovered.
          failing=$(jq -r '[.sourceErrors[].source] | join("|")' .cache/run-report.json)
          gh issue list --label content-pipeline --state open --json number,title --jq '.[] | [.number, .title] | @tsv' |
          while IFS=$'\t' read -r number title; do
            source=$(echo "$title" | sed -n 's/^Content pipeline: \(.*\) is failing$/\1/p')
            [ -n "$source" ] || continue
            case "|${failing}|" in
              *"|${source}|"*) ;;
              *) gh issue close "$number" --comment "Source recovered in run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" ;;
            esac
          done
