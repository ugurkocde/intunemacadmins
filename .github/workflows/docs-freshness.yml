name: Docs freshness

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:
    inputs:
      drift_page:
        description: "Only drift-check pages whose path contains this substring (targeted test run). Blank = all sourced pages."
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: docs-freshness
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    # A full run drafts + verifies ~35 sourced pages (~70 model calls), so give
    # it ample headroom with a generous timeout.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so review-age can read git last-modified dates

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Freshness self-test
        run: npm run freshness:selftest

      - name: Scan docs and draft corrections
        env:
          # Enables drift + AI-drafted edits on pages that declare `sources`.
          # If unset, the run is deterministic-only and drift is skipped.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRIFT_PAGE: ${{ github.event.inputs.drift_page }}
        run: |
          args=(--apply-edits)
          [ -n "$DRIFT_PAGE" ] && args+=(--drift-page="$DRIFT_PAGE")
          npm run freshness -- "${args[@]}"

      - name: Write run summary
        if: ${{ always() }}
        run: |
          if [ -f .cache/freshness-report.md ]; then
            cat .cache/freshness-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      # Drafted corrections -> a PR. Only edits that passed independent AI
      # verification reach here; uncertain findings go to the issue below, never
      # to this PR. The PR is auto-merged in the next step.
      - name: Open docs-correction PR
        id: cpr
        if: ${{ hashFiles('.cache/edits-pr-body.md') != '' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.DOCS_AUTOMERGE_TOKEN }}
          add-paths: |
            content/**
            site/changelog/**
          branch: docs-freshness/updates
          delete-branch: true
          commit-message: Update docs to match current Microsoft/Apple documentation
          title: Docs corrections from upstream drift
          body-path: .cache/edits-pr-body.md
          labels: docs-freshness

      # Wait for the PR validation workflow on the exact current head, then use
      # the automation token's admin bypass for the ruleset review requirement.
      - name: Validate and auto-merge corrections
        if: ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.DOCS_AUTOMERGE_TOKEN }}
        run: bash scripts/ci/auto-merge-pr.sh "${{ steps.cpr.outputs.pull-request-number }}"

      # Everything that isn't a clean auto-edit (overdue review, expired dates,
      # outdated macOS recommendations, broken links, and drift that couldn't be
      # applied verbatim) -> one rolling issue.
      - name: Sync the freshness issue
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "Docs freshness report"
        run: |
          set -euo pipefail
          gh label create docs-freshness --description "Automated docs freshness" --color 0E8A16 --force

          count=$(jq '.findings | length' .cache/freshness-report.json)
          existing=$(gh issue list --label docs-freshness --state open \
            --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty')

          if [ "$count" -gt 0 ]; then
            if [ -n "$existing" ]; then
              gh issue edit "$existing" --body-file .cache/freshness-report.md
            else
              gh issue create --title "$TITLE" --label docs-freshness \
                --body-file .cache/freshness-report.md
            fi
          elif [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file .cache/freshness-report.md
            gh issue close "$existing" --comment "All documentation pages are within the review window with no outstanding freshness findings."
          fi
